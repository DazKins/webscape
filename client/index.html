<!DOCTYPE html>
<html>
  <head>
    <title>Webscape</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <style>
      :root {
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-right: env(safe-area-inset-right, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-left: env(safe-area-inset-left, 0px);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-text-size-adjust: 100%;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      #roots {
        position: relative;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
      }
      #sceneLayerRoot {
        z-index: 0;
      }
      #hudLayerRoot {
        z-index: 1000;
      }
      #uiLayerRoot {
        z-index: 2000;
      }
      #sceneLayerRoot,
      #hudLayerRoot,
      #uiLayerRoot {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #uiLayerRoot {
        pointer-events: none;
      }
    </style>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="roots">
      <div id="sceneLayerRoot"></div>
      <div id="hudLayerRoot"></div>
      <div id="uiLayerRoot"></div>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>

openapi: 3.1.0
info:
  title: Webscape World Format
  version: 0.1.0
  description: |
    Schema for authoring Webscape worlds.

    Tile arrays use row-major order. Given a tile at coordinate (x, y), its
    index is `y * size.x + x`. The total number of entries in each tile layer
    must be `size.x * size.y`.
paths: {}
components:
  schemas:
    WorldFormat:
      type: object
      additionalProperties: false
      required:
        - formatVersion
        - id
        - size
        - terrain
      properties:
        formatVersion:
          type: integer
          const: 1
          description: Version of this world document format.
        id:
          type: string
          pattern: "^[a-z0-9][a-z0-9_-]*$"
          examples:
            - starter
        displayName:
          type: string
          examples:
            - Starter Island
        size:
          $ref: "#/components/schemas/WorldSize"
        terrain:
          type: array
          description: |
            Flat row-major terrain layer. Coordinate (x, y) is stored at
            `terrain[y * size.x + x]`.
          items:
            $ref: "#/components/schemas/TerrainType"
        blockers:
          type: array
          description: |
            Optional flat row-major invisible blocker layer. Coordinate (x, y)
            is stored at `blockers[y * size.x + x]`. `true` blocks movement.
          items:
            type: boolean
        walls:
          type: array
          description: Visible wall objects that are rendered above tiles and block movement.
          default: []
          items:
            $ref: "#/components/schemas/WorldWall"
        entities:
          type: array
          description: Authored map entities. Each entity is defined by component JSON parsed into ECS components.
          default: []
          items:
            $ref: "#/components/schemas/WorldEntity"

    WorldSize:
      type: object
      additionalProperties: false
      required:
        - x
        - y
      properties:
        x:
          type: integer
          minimum: 1
          examples:
            - 64
        y:
          type: integer
          minimum: 1
          examples:
            - 64

    TerrainType:
      type: string
      description: Freeform tile terrain identifier, such as `grass`, `road`, or `water`.

    WorldEntity:
      type: object
      additionalProperties: false
      required:
        - id
        - components
      properties:
        id:
          type: string
          pattern: "^[a-z0-9][a-z0-9_-]*$"
          examples:
            - chest_001
        components:
          type: object
          description: Freeform authored ECS component data, keyed by component id.
          additionalProperties: true

    WorldWall:
      type: object
      additionalProperties: false
      required:
        - id
        - type
        - x
        - y
      properties:
        id:
          type: string
          pattern: "^[a-z0-9][a-z0-9_-]*$"
          examples:
            - wall_001
        type:
          type: string
          description: Freeform wall type identifier, such as `stone` or `wood`.
        x:
          type: integer
          minimum: 0
        y:
          type: integer
          minimum: 0

  examples:
    TinyWorld:
      summary: A 3 by 2 world using flat row-major tile arrays.
      value:
        formatVersion: 1
        id: starter
        displayName: Starter Island
        size:
          x: 3
          y: 2
        terrain:
          - grass
          - grass
          - road
          - water
          - grass
          - road
        blockers:
          - false
          - false
          - false
          - true
          - false
          - false
        walls:
          - id: wall_001
            type: stone
            x: 2
            y: 0
        entities:
          - id: player_spawn
            components:
              position:
                x: 0
                y: 0
              playerSpawn: {}
          - id: chest_001
            components:
              position:
                x: 0
                y: 1
              metadata:
                name: chest_001
                type: chest
                width: 1
                height: 1
                blocksMovement: true
              renderable:
                type: chest
              lootable:
                once: true
                items:
                  - name: Mysterious Key
                    type: quest
          - id: bob
            components:
              position:
                x: 2
                y: 1
              metadata:
                name: Bob
                entityType: dude
              renderable:
                type: human
              conversation:
                conversationId: guide_intro
          - id: rat_spawn_001
            components:
              position:
                x: 1
                y: 1
              spawn:
                respawnTicks: 20
                entity:
                  components:
                    metadata:
                      name: Rat
                      entityType: rat
                    renderable:
                      type: human
                    randomwalk:
                      walkTimer: 10
                    health:
                      maxHealth: 100
                    basestats:
                      strength: 6
                      dexterity: 5
                      vitality: 6
                    equipped: {}
                    combatstats: {}

openapi: 3.1.0
info:
  title: Webscape Game Project Format
  version: 0.1.0
  description: |
    Schema for the root `game.json` manifest used by the Webscape editor.

    The manifest is the entry point for a folder-based game project. It lists
    the source JSON files that make up the game, such as maps, conversations,
    and quests.
paths: {}
components:
  schemas:
    GameProjectFormat:
      type: object
      additionalProperties: false
      required:
        - formatVersion
        - id
        - files
      properties:
        formatVersion:
          type: integer
          const: 1
          description: Version of this game project document format.
        id:
          type: string
          pattern: "^[a-z0-9][a-z0-9_-]*$"
          examples:
            - starter_game
        displayName:
          type: string
          examples:
            - Starter Game
        files:
          $ref: "#/components/schemas/GameProjectFiles"

    GameProjectFiles:
      type: object
      additionalProperties: false
      required:
        - maps
        - conversations
        - quests
      properties:
        maps:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ProjectFilePath"
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/ProjectFilePath"
        quests:
          type: array
          items:
            $ref: "#/components/schemas/ProjectFilePath"

    ProjectFilePath:
      type: string
      pattern: "^(?!/)(?!.*(?:^|/)\\.\\.?(/|$))(?!.*\\\\)(?!.*//).+[^/]$"
      examples:
        - maps/starter.json
        - conversations/starter-conversations.json
        - quests/tutorial.json

  examples:
    StarterGame:
      summary: A small folder-based game project.
      value:
        formatVersion: 1
        id: starter_game
        displayName: Starter Game
        files:
          maps:
            - maps/starter.json
          conversations:
            - conversations/starter-conversations.json
          quests: []
